                const unsupported = files.filter(file => !SUPPORTED_IMAGE_TYPES.includes(file.type));
                if (unsupported.length) {

                    pushInfoMessage(`Responsible Image Use with ELM
When uploading images (JPEG, PNG, WebP, GIF), please consider the following:\n\n
<br> Source: Where is it from? - Legal use and credibility\n\n
<br> License: Is it cleared for use? - Avoids infringement\n\n
<br> Bias: Does it stereotype? - Ensures fairness\n\n
<br> Storage: Is it from a secure system? - Data protection/GDPR
<br> Use: Is it AI-generated/altered? - Declare manipulations
<br> Accessibility: Is alt-text added? - Inclusion for all`);
                });
            };

                if (imageInputRef.current) {
                    imageInputRef.current.click();

                setActiveDropdown(null);

            const togglePinHistory = (id) => {

            const startEditingHistory = (history) => {
                setEditingHistoryId(history.id);

                setChatHistory(prev => prev.map(item =>

            const downloadHistory = (history) => {
                const transcript = (history.messages || []).map(msg => `${msg.role.toUpperCase()}: ${msg.content}`).join('\n\n');
                const blob = new Blob([`Title: ${history.title}\nUpdated: ${history.updated}\n\n${transcript}`], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `${history.title.replace(/[^a-z0-9]+/gi, '_') || 'chat'}.txt`;
                document.body.appendChild(link);
                link.click();
                link.remove();
                setTimeout(() => URL.revokeObjectURL(url), 1500);

                onNavigate('chat');

                const newPrompt = {
                    id: `user-${Date.now()}`,

                    source: 'user'
                };
                setPrompts(prev => [newPrompt, ...prev]);
                setPromptFilter('my');
                closePromptModal();

                setInputVal("");
                setHasChatStarted(true);
                
                setMessages(prev => [...prev, { role: 'user', content: userMsg }]);

                setTimeout(() => {
                setMessages(prev => [...prev, { role: 'assistant', content: LOREM_IPSUM_RESPONSE }]);
                }, 600);

            const handleKeyDown = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSendMessage();
                }

            const copyToClipboard = async (text) => {
                try {
                    await navigator.clipboard.writeText(text);
                } catch (err) {
                    console.error('Failed to copy', err);
                }
            };

            const handleMouseDown = (e) => {
                resizingRef.current = true;
                e.preventDefault();
                startYRef.current = e.clientY;
                startHeightRef.current = inputHeight;
                document.addEventListener('mousemove', handleMouseMove);
                document.addEventListener('mouseup', handleMouseUp);
            };

            const handleMouseMove = (e) => {
                if (resizingRef.current) {
                    const delta = e.clientY - startYRef.current;
                    const newHeight = startHeightRef.current + delta;
                    
                    if (newHeight > 64 && newHeight < 600) {
                        setInputHeight(newHeight);

                    </div>
                    <div className="flex justify-end mt-1">
                        <span className="text-[10px] text-gray-500">80%</span>
                    </div>
                    </div>
                </div>

                {isUploadModalOpen && (
                    <div 
                    className="absolute inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm"
                    role="dialog"
                    aria-modal="true"
                    >
                    <div className="bg-white rounded-xl shadow-2xl w-full max-w-lg p-6">
                        
                        <div className="flex justify-center mb-4">
                            <div className="w-12 h-12 rounded-full bg-amber-100 text-amber-600 flex items-center justify-center border-4 border-amber-50">
                            <Icon name="cloud_upload" size={24} />
                            </div>
                        </div>

                        <h2 className="text-xl font-bold text-center text-gray-900 mb-2">Before you upload files</h2>
                        <p className="text-sm text-center text-gray-500 mb-6">You confirm you have the right to share these documents?</p>

                        <div className="bg-sky-50 border border-sky-200 rounded-lg p-4 mb-8 text-xs text-sky-800 space-y-3">
                            <p className="flex gap-2">
                            <Icon name="info" size={18} className="shrink-0 mt-0.5" />
                            <span>
                                ELM operates under a Zero Data Retention policy with OpenAI.
                                Your data stays secure and is restricted to University use only.
                            </span>
                            </p>
                            <p>
                            If you need to process personal or private data for business purposes, please contact <a href="#" className="underline font-medium">edina@ed.ac.uk</a>. You may need formal approval from the University Data Protection Officer.
                            </p>
                            <p>
                            ELM must not be used to upload identifiable patient or clinical data.
                            </p>
                        </div>

                        <div className="flex items-center justify-end gap-4">
                            <button 
                            onClick={() => setIsUploadModalOpen(false)}
                            className="text-sm font-bold text-gray-600 hover:text-gray-900 px-3 py-2"
                            >
                            Decline
                            </button>
                            <button 
                            onClick={handleAcceptUpload}
                            className="text-sm font-bold text-elm-dark hover:text-green-800 px-3 py-2"
                            >
                            Accept
                            </button>
                        </div>
                    </div>
                    </div>
                )}

                {isSettingsModalOpen && (
                    <div 
                    className="absolute inset-0 z-[60] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm"
                    role="dialog"
                    aria-modal="true"
                    >
                    <div className="bg-white rounded-xl shadow-2xl w-full max-w-4xl h-[80vh] flex flex-col overflow-hidden">
                        <div className="flex items-center justify-between p-5 border-b border-gray-100 bg-white shrink-0">
                            <h2 className="text-xl font-bold text-gray-900 flex items-center gap-2">
                            <Icon name="settings" size={24} className="text-elm-dark" />
                            <span>Settings</span>
                            </h2>
                            <button onClick={() => setIsSettingsModalOpen(false)} className="p-2 hover:bg-gray-100 rounded-full transition-colors text-gray-500">
                            <Icon name="close" size={20} />
                            </button>
                        </div>
                        
                        <div className="flex flex-col md:flex-row flex-1 overflow-hidden">
                            <div className="w-full md:w-64 bg-gray-50 border-b md:border-b-0 md:border-r border-gray-200 overflow-x-auto md:overflow-y-auto flex md:flex-col shrink-0">
                            {SETTINGS_TABS.map((tab) => (
                                <button
                                    key={tab.id}
                                    onClick={() => setActiveSettingsTab(tab.id)}
                                    className={`
                                    flex items-center gap-3 px-5 py-4 text-sm font-medium transition-all text-left whitespace-nowrap
                                    ${activeSettingsTab === tab.id 
                                        ? 'bg-white text-elm-dark border-b-2 md:border-b-0 md:border-l-4 border-elm-dark shadow-sm' 
                                        : 'text-gray-600 hover:bg-gray-100 hover:text-gray-900 border-l-4 border-transparent'
                                    }
                                    `}
                                >
                                    {tab.icon}
                                    <span>{tab.label}</span>
                                </button>
                            ))}
                            </div>

                            <div className="flex-1 overflow-y-auto p-6 md:p-8 bg-white">
                            <div className="max-w-2xl mx-auto" key={activeSettingsTab}>
                                
                                <h3 className="text-2xl font-bold text-gray-900 mb-6 border-b border-gray-100 pb-2">
                                    {SETTINGS_TABS.find(t => t.id === activeSettingsTab)?.label}
                                </h3>

                                {activeSettingsTab === 'general' && (
                                    <div className="space-y-6">
                                        <div className="space-y-4">
                                        <label className="block text-sm font-bold text-gray-700">Appearance</label>
                                        <div className="grid grid-cols-3 gap-3">
                                            <button className="flex flex-col items-center gap-2 p-3 border-2 border-elm-dark bg-green-50 rounded-lg text-elm-dark">
                                                <Icon name="light_mode" size={24} />
                                                <span className="text-xs font-semibold">Light</span>
                                            </button>
                                            <button className="flex flex-col items-center gap-2 p-3 border border-gray-200 hover:border-gray-400 rounded-lg text-gray-600">
                                                <div className="w-6 h-6 bg-gray-800 rounded-full" />
                                                <span className="text-xs font-medium">Dark</span>
                                            </button>
                                            <button className="flex flex-col items-center gap-2 p-3 border border-gray-200 hover:border-gray-400 rounded-lg text-gray-600">
                                                <Icon name="settings" size={24} />
                                                <span className="text-xs font-medium">System</span>
                                            </button>
                                        </div>
                                        </div>
                                        <div className="space-y-2">
                                        <label className="block text-sm font-bold text-gray-700">Language</label>
                                        <div className="relative">
                                            <Icon name="public" size={20} className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" />
                                            <select className="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-elm-dark/20 focus:border-elm-dark outline-none bg-white">
                                                <option>English (UK)</option>
                                                <option>English (US)</option>
                                                <option>French</option>
                                                <option>Spanish</option>
                                            </select>
                                        </div>
                                        </div>
                                    </div>
                                )}

                                {activeSettingsTab === 'about' && (
                                    <div className="text-center py-8">
                                        <div className="w-16 h-16 bg-elm-dark text-white rounded-2xl flex items-center justify-center mx-auto mb-4">
                                        <Icon name="park" size={32} className="text-elm-dark" />
                                        </div>
                                        <h4 className="text-xl font-bold text-gray-900">ELM Chat Interface</h4>
                                        <p className="text-sm text-gray-500 mt-2">Version 1.2.0 (Beta)</p>
                                        <p className="text-sm text-gray-500 mt-1">Developed by EDINA, The University of Edinburgh</p>
                                        
                                        <div className="mt-8 flex justify-center gap-4 text-sm text-elm-dark font-medium">
                                        <a href="#" className="hover:underline">Terms of Service</a>
                                        <span className="text-gray-300">|</span>
                                        <a href="#" className="hover:underline">Privacy Policy</a>
                                        </div>
                                    </div>
                                )}

                            </div>
                            </div>
                    </div>
                    </div>
                    </div>
                )}

                {renderMobileSheet()}

                </main>
            );
        };

        // 4. APP COMPONENT
        const App = () => {
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [currentView, setCurrentView] = useState('chat');

            const toggleSidebar = () => setIsSidebarOpen(!isSidebarOpen);

            return (
                <div className="flex h-screen w-full bg-[#f4f4f4] text-slate-800 overflow-hidden relative">
                    {/* Mobile Overlay */}
                    {isSidebarOpen && (
                        <div 
                        className="fixed inset-0 bg-black/50 z-20 md:hidden"
                        onClick={() => setIsSidebarOpen(false)}
                        aria-hidden="true"
                        />
                    )}

                    <Sidebar 
                        isOpen={isSidebarOpen} 
                        onClose={() => setIsSidebarOpen(false)}
                        currentView={currentView}
                        onNavigate={setCurrentView}
                    />

                    <div className={`flex-1 flex flex-col h-full w-full relative`}>
                        <MainArea 
                        isSidebarOpen={isSidebarOpen} 
                        toggleSidebar={toggleSidebar}
                        currentView={currentView}
                        onNavigate={setCurrentView}
                        />
                    </div>
                </div>
            );
        };

        // --- MOUNT ---
        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
